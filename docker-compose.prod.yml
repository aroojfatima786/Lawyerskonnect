# Full stack production overrides (backend + frontend + mongo on one server).
# Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build --profile fullstack

services:
  mongo:
    ports: []

  backend:
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      API_BASE_URL: ${API_BASE_URL}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}

  frontend:
    profiles:
      - fullstack
    build:
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT:-80}:80"
